<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Xerela Sunucusu</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

    body {
      background-color: #1a1a1a; 
      background-image: url('IMG_20260423_172129.png'); 
      background-size: cover;
      background-position: center;
      margin: 0;
      padding: 0;
      /* İşte kaydırmayı bitiren büyü: */
      height: 100vh;
      width: 100vw;
      overflow: hidden; 
      display: flex;
      flex-direction: column;
      align-items: center;
      font-family: sans-serif;
    }

    /* Üst taraftaki taş efektli isim */
    h1 {
      margin-top: 50px; /* Üstten tam kararında boşluk */
      font-family: 'Press Start 2P', cursive;
      font-size: 26px;
      color: #bfbfbf;
      text-transform: uppercase;
      text-shadow: 3px 3px 0 #333, -1px -1px 0 #eee;
      z-index: 10;
    }

    /* Buton tam ortalarda ve kaydırmasız */
    .btn-container {
      position: absolute;
      top: 75%; /* Sayfayı aşağı kaydırmana gerek kalmadan tam o çimenli yere denk gelir */
      transform: translateY(-50%);
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .btn {
      width: 75%;
      max-width: 300px;
      padding: 14px;
      background-color: #47a025;
      color: white;
      text-decoration: none;
      border-radius: 6px;
      font-weight: bold;
      cursor: pointer;
      border: 2px solid #2a6116;
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 1px;
      box-shadow: 0 4px 0 #2a6116;
      transition: 0.1s;
    }

    .btn:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #2a6116;
    }

    #statusText {
      margin-top: 10px;
      color: white;
      font-weight: bold;
      font-size: 12px;
      text-shadow: 1px 1px 2px black;
    }
  </style>
</head>
<body>

  <h1>XERELA</h1>
  
  <div class="btn-container">
    <button id="joinBtn" class="btn">SUNUCUYA KATIL</button>
    <span id="statusText"></span>
  </div>

  <script>
    const SUNUCU_IP = "xerela47.aternos.me";
    const btn = document.getElementById('joinBtn');
    const statusText = document.getElementById('statusText');

    function playClick() {
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        osc.connect(ctx.destination);
        osc.start(); 
        osc.stop(ctx.currentTime + 0.1);
      } catch(e) { console.log("Ses çalınmadı"); }
    }

    btn.addEventListener('click', () => {
      playClick();
      statusText.textContent = "BAĞLANILIYOR...";
      statusText.style.color = "#fbbf24";
      
      setTimeout(() => {
        window.location.href = `minecraft://externalServer?name=Xerela&serverAddress=${SUNUCU_IP}&port=19132`;
        statusText.textContent = "MINECRAFT AÇILIYOR!";
        statusText.style.color = "#4ade80";
      }, 800);
    });
  </script>
</body>
</html>
