<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Xerela Sunucusu</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <style>
        /* Tüm sayfa ayarları */
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden; /* Taşmaları engelle */
            background-color: #000; /* Arka plan siyah */
            font-family: 'VT323', monospace; /* Minecraft tipi font */
            -webkit-tap-highlight-color: transparent; /* Mobil tıklama vurgusunu kaldır */
        }

        /* Arka plan manzarası (Image 1'dekiSteve'li güneşli manzara) */
        .background-scene {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('image_1.png'); /* Görsel adının doğru olduğundan emin ol */
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            z-index: 1; /* En arkada */
            /* Hafif bir bulanıklık ekleyerek ön planı öne çıkarabiliriz (isteğe bağlı) */
            /* filter: blur(2px); */
        }

        /* Telefon Çerçevesi (Konteyner) */
        .phone-container {
            position: relative;
            z-index: 10; /* Arka planın önünde */
            width: 90%; /* Mobilde genişlik */
            max-width: 360px; /* Masaüstünde maksimum genişlik (telefon boyutu) */
            height: 80vh; /* Ekranın %80'i kadar yükseklik */
            margin: 10vh auto; /* Ortala ve üstten-alttan boşluk bırak */
            background-color: #fff; /* Telefonun iç ekranı beyaz */
            border-radius: 36px; /* Telefonun yuvarlak köşeleri */
            border: 12px solid #222; /* Siyah telefon çerçevesi */
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); /* Derinlik hissi */
            overflow: hidden; /* İçerik çerçeveden taşmasın */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between; /* İçeriği yukarı ve aşağı yay */
            padding: 20px;
        }

        /* Telefonun üst kısmındaki detaylar (Ahize, kamera) */
        .phone-header {
            width: 100%;
            height: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: absolute;
            top: 0;
        }
        .phone-notch {
            width: 60px;
            height: 10px;
            background-color: #222;
            border-bottom-left-radius: 10px;
            border-bottom-right-radius: 10px;
        }

        /* Başlık Alanı (XERELA SUNUCUSU) */
        .server-title {
            color: #333;
            font-size: 3rem; /* Mobilde büyük olsun */
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 60px; /* Notch'tan aşağıda başla */
            line-height: 1.1;
        }

        /* Buton ve Toprak Alanı Konteyneri */
        .bottom-section {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px; /* Buton ve toprak arası boşluk */
            margin-bottom: 20px; /* Çerçevenin altından boşluk */
        }

        /* Tıklanabilir Buton */
        .join-button {
            background-color: #4a4a4a; /* Koyu gri */
            color: white;
            border: 4px solid #fff; /* Beyaz çerçeve */
            border-radius: 4px;
            padding: 15px 30px;
            font-size: 1.8rem;
            cursor: pointer;
            text-transform: uppercase;
            width: 80%; /* Buton genişliği */
            text-align: center;
            position: relative;
            transition: all 0.1s ease; /* Tıklama efekti için geçiş */
            outline: none; /* Odaklanma çizgisini kaldır */
        }

        /* TIKLAMA EFEKTİ - Basılı tutunca */
        .join-button:active {
            transform: scale(0.95); /* Hafifçe küçült */
            background-color: #333; /* Daha koyu gri yap */
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.5); /* İç gölge ekle (basılma hissi) */
        }

        /* Toprak Blok Alanı */
        .dirt-block {
            width: 100%;
            height: 100px;
            background-color: #8b4513; /* Kahverengi toprak */
            border-top: 10px solid #228b22; /* Yeşil çim çizgisi */
            border-radius: 4px;
        }

    </style>
</head>
<body>

    <div class="background-scene"></div>

    <div class="phone-container">
        <div class="phone-header">
            <div class="phone-notch"></div>
        </div>

        <h1 class="server-title">XERELA<br>SUNUCUSU</h1>

        <div class="bottom-section">
            <button class="join-button" onclick="alert('Sunucuya katılma özelliği yakında eklenecek!')">
                SUNUCUYA KATIL
            </button>
            
            <div class="dirt-block"></div>
        </div>
    </div>

</body>
</html>
