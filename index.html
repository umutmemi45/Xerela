<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xerela Sunucusu</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Courier New', Courier, monospace;
        }

        /* Arka Plan: Dağ ve sabah manzarası */
        .background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('https://wallpaperaccess.com/full/153641.jpg') no-repeat center center;
            background-size: cover;
            z-index: -2;
        }

        /* Alt taraftaki toprak ve çimen katmanı */
        .ground {
            position: fixed;
            bottom: 0;
            width: 100%;
            height: 25%;
            background: #5d3a1a;
            border-top: 15px solid #2e5d1f;
            z-index: -1;
            box-shadow: inset 0 10px 20px rgba(0,0,0,0.5);
        }

        /* Havada uçuşan pikseller */
        .particle {
            position: absolute;
            width: 6px;
            height: 6px;
            background: rgba(255, 255, 255, 0.5);
            animation: float 10s infinite linear;
        }

        @keyframes float {
            0% { transform: translateY(110vh) rotate(0deg); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
        }

        /* Koşan Karakter (Steve/Karakter) */
        .runner {
            position: absolute;
            bottom: 20%;
            width: 80px;
            z-index: 5;
            animation: run 8s infinite linear;
        }

        @keyframes run {
            0% { left: -100px; }
            100% { left: 110%; }
        }

        /* İçerik Konumlandırma */
        .content {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        h1 {
            color: white;
            font-size: 3rem;
            text-shadow: 4px 4px 0px #373737;
            margin-bottom: 20px;
            letter-spacing: 2px;
        }

        /* Buton Tasarımı */
        .join-box {
            display: flex;
            align-items: center;
            background-color: rgba(0, 0, 0, 0.8);
            padding: 20px 35px;
            border: 4px solid #fff;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.3s;
            z-index: 10;
        }

        .join-box:hover {
            background-color: rgba(46, 93, 31, 0.9);
            transform: scale(1.05);
        }

        .dirt-icon {
            width: 40px;
            height: 40px;
            margin-right: 15px;
        }

        .btn-text {
            color: #fff;
            font-size: 1.5rem;
            font-weight: bold;
        }

        /* Güneş */
        .sun {
            position: absolute;
            top: 50px;
            right: 60px;
            width: 80px;
            height: 80px;
            background: #ffea00;
            border-radius: 50%;
            box-shadow: 0 0 50px #ffea00;
        }
    </style>
</head>
<body>

    <div class="background"></div>
    <div class="ground"></div>
    <div class="sun"></div>

    <div class="particle" style="left: 15%; animation-delay: 0s;"></div>
    <div class="particle" style="left: 45%; animation-delay: 4s;"></div>
    <div class="particle" style="left: 75%; animation-delay: 2s;"></div>

    <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHJndm8xdmR5bmR5bmR5bmR5bmR5bmR5bmR5bmR5bmR5bmR5bmR5JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1z/v6aOadnPQalCz_LMTJ/giphy.gif" class="runner">

    <div class="content">
        <h1>XERELA SUNUCUSU</h1>
        <div class="join-box" onclick="playEffect()">
            <img src="https://blockbench.net/logo_dirt.png" class="dirt-icon" alt="Toprak">
            <span class="btn-text">SUNUCUYA KATIL</span>
        </div>
    </div>

    <audio id="sound">
        <source src="https://www.soundjay.com/buttons/sounds/button-16.mp3" type="audio/mpeg">
    </audio>

    <script>
        function playEffect() {
            var snd = document.getElementById("sound");
            snd.play();
            setTimeout(function() {
                alert("Sivas sunucusuna bağlanılıyor...");
            }, 200);
        }
    </script>

</body>
</html>
