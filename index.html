<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zeynep Koç - QR Kod Oluşturucu</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(25px);
            border-radius: 30px;
            padding: 50px;
            max-width: 900px;
            width: 100%;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo {
            font-size: 3.5rem;
            font-weight: 700;
            background: linear-gradient(45deg, #ff6b6b, #4ecdc4, #45b7d1, #96ceb4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 15px;
            animation: rainbow 4s ease-in-out infinite;
        }

        @keyframes rainbow {
            0%, 100% { filter: hue-rotate(0deg); }
            33% { filter: hue-rotate(120deg); }
            66% { filter: hue-rotate(240deg); }
        }

        .title {
            font-size: 1.8rem;
            font-weight: 600;
            color: #333;
            margin-bottom: 5px;
        }

        .subtitle {
            color: #666;
            font-size: 1rem;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 25px;
            margin-bottom: 40px;
        }

        .form-group {
            position: relative;
        }

        .form-group label {
            display: block;
            font-weight: 500;
            color: #555;
            margin-bottom: 8px;
            font-size: 0.95rem;
        }

        .form-group input {
            width: 100%;
            padding: 16px 20px;
            border: 2px solid #e1e5e9;
            border-radius: 15px;
            font-size: 16px;
            transition: all 0.3s ease;
            background: #fff;
            color: #333;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
            transform: translateY(-2px);
        }

        /* QR Tasarım Seçenekleri */
        .qr-options {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 15px;
            margin-bottom: 40px;
        }

        .option-group h4 {
            grid-column: 1 / -1;
            text-align: center;
            color: #333;
            font-size: 1.1rem;
            margin-bottom: 15px;
        }

        .qr-style {
            padding: 15px;
            border: 2px solid #e1e5e9;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
            background: #f8f9fa;
        }

        .qr-style:hover, .qr-style.active {
            border-color: #667eea;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.3);
        }

        /* QR Önizleme */
        .qr-preview {
            text-align: center;
            margin-bottom: 40px;
        }

        .preview-title {
            font-size: 1.3rem;
            font-weight: 600;
            color: #333;
            margin-bottom: 20px;
        }

        #qrCanvas {
            width: 280px !important;
            height: 280px !important;
            border-radius: 20px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.2);
            background: #fff;
            padding: 20px;
            margin: 0 auto;
            display: block;
        }

        .actions {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 16px 32px;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            min-width: 160px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 40px rgba(102, 126, 234, 0.5);
        }

        .btn-secondary {
            background: linear-gradient(135deg, #ff6b6b, #ee5a52);
            color: white;
            box-shadow: 0 10px 30px rgba(255, 107, 107, 0.4);
        }

        .btn-secondary:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 40px rgba(255, 107, 107, 0.5);
        }

        @media (max-width: 768px) {
            .container {
                padding: 30px 20px;
                margin: 10px;
            }
            
            .form-grid {
                grid-template-columns: 1fr;
            }
            
            .qr-options {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .logo {
                font-size: 2.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1 class="logo">📱 QR</h1>
            <div class="title">Zeynep Koç</div>
            <div class="subtitle">QR Kod Oluşturucu - Kişisel Bilgiler</div>
        </div>

        <div class="form-grid">
            <div class="form-group">
                <label>Ad Soyad</label>
                <input type="text" id="name" placeholder="Zeynep Koç">
            </div>
            <div class="form-group">
                <label>Telefon</label>
                <input type="tel" id="phone" placeholder="0555 123 45 67">
            </div>
            <div class="form-group">
                <label>E-posta</label>
                <input type="email" id="email" placeholder="zeynep@example.com">
            </div>
        </div>

        <div class="qr-options">
            <h4>QR Tasarım Seç</h4>
            <div class="qr-style active" data-style="normal">
                <i class="fas fa-square" style="font-size: 24px; margin-bottom: 8px; display: block;"></i>
                Klasik
            </div>
            <div class="qr-style" data-style="dots">
                <i class="fas fa-circle" style="font-size: 24px; margin-bottom: 8px; display: block;"></i>
                Noktalı
            </div>
            <div class="qr-style" data-style="rounded">
                <i class="fas fa-circle" style="font-size: 20px; margin-bottom: 8px; display: block;"></i>
                Yuvarlak
            </div>
            <div class="qr-style" data-style="extra-rounded">
                <i class="fas fa-circle" style="font-size: 16px; margin-bottom: 8px; display: block;"></i>
                Yumuşak
            </div>
        </div>

        <div class="qr-preview">
            <div class="preview-title">QR Kod Önizleme</div>
            <canvas id="qrCanvas"></canvas>
        </div>

        <div class="actions">
            <button class="btn btn-primary" onclick="generateQR()">
                <i class="fas fa-qrcode"></i> QR Oluştur
            </button>
            <button class="btn btn-secondary" onclick="downloadQR()">
                <i class="fas fa-download"></i> PNG İndir
            </button>
        </div>
    </div>

    <script>
        let currentStyle = 'normal';

        // Tasarım seçimi
        document.querySelectorAll('.qr-style').forEach(style => {
            style.addEventListener('click', () => {
                document.querySelectorAll('.qr-style').forEach(s => s.classList.remove('active'));
                style.classList.add('active');
                currentStyle = style.dataset.style;
                generateQR(); // Otomatik yenile
            });
        });

        // QR Oluşturma - KENDİLİĞİNDEN ÇALIŞIR
        function generateQR() {
            const name = document.getElementById('name').value || 'Zeynep Koç';
            const phone = document.getElementById('phone').value || '0555 123 45 67';
            const email = document.getElementById('email').value || 'zeynep@example.com';

            const contactData = `BEGIN:VCARD
VERSION:3.0
FN:${name}
TEL:${phone}
EMAIL:${email}
END:VCARD`;

            const canvas = document.getElementById('qrCanvas');
            
            // Önce temizle
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Canvas boyutları
            canvas.width = 400;
            canvas.height = 400;

            // QR kod oluştur
            QRCode.toCanvas(canvas, contactData, {
                width: 360,
                margin: 1,
                color: {
                    dark: '#1a1a1a',
                    light: '#FFFFFF'
                },
                ...getQRConfig()
            }, (error) => {
                if (error) {
                    console.error('QR Hatası:', error);
                    return;
                }
                
                // Renkli çerçeve ekle
                ctx.strokeStyle = '#667eea';
                ctx.lineWidth = 12;
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                ctx.strokeRect(15, 15, 370, 370);
                
                // Gradient arka plan
                const gradient = ctx.createLinearGradient(0, 0, 400, 400);
                gradient.addColorStop(0, 'rgba(102, 126, 234, 0.15)');
                gradient.addColorStop(1, 'rgba(118, 75, 162, 0.15)');
                ctx.fillStyle = gradient;
                ctx.fillRect(0, 0, 400, 400);
            });
        }

        // QR Konfigürasyonları
        function getQRConfig() {
            const configs = {
                normal: {},
                dots: {
                    dotsOptions: {
                        type: "dots",
                        color: "#1a1a1a"
                    }
                },
                rounded: {
                    dotsOptions: {
                        type: "rounded",
                        color: "#1a1a1a"
                    }
                },
                'extra-rounded': {
                    dotsOptions: {
                        type: "extra-rounded",
                        color: "#1a1a1a"
                    }
                }
            };
            return configs[currentStyle] || {};
        }

        // QR İndirme
        function downloadQR() {
            const canvas = document.getElementById('qrCanvas');
            const link = document.createElement('a');
            link.download = 'Zeynep-Koç-QR.png';
            link.href = canvas.toDataURL('image/png');
            link.click();
        }

        // SAYFA AÇILDIĞINDA OTOMATİK QR OLUŞTUR
        window.addEventListener('load', () => {
            generateQR();
        });

        // Input değiştiğinde otomatik güncelle
        document.querySelectorAll('input').forEach(input => {
            input.addEventListener('input', generateQR);
        });
    </script>
</body>
</html>
