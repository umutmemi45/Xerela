<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roblox Kod Merkezi</title>
    <style>
        /* SIFIR KASMA - HAFİF CSS */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: #121212; color: #eee; font-family: sans-serif; }

        /* ÜST PANEL */
        header {
            background: #1f1f1f;
            padding: 15px;
            text-align: center;
            border-bottom: 2px solid #00ffcc;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo { font-size: 1.2rem; font-weight: bold; color: #00ffcc; margin-bottom: 10px; }
        
        #search {
            width: 90%;
            padding: 10px;
            border-radius: 5px;
            border: 1px solid #333;
            background: #252525;
            color: white;
        }

        /* 2'Lİ SİSTEM (YAN YANA KARTLAR) */
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr; /* HER YERDE YAN YANA 2 TANE */
            gap: 10px;
            padding: 10px;
        }

        .card {
            background: #1e1e1e;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 15px;
            text-align: center;
            position: relative;
        }

        .item-icon {
            font-size: 40px;
            margin-bottom: 10px;
            display: block;
        }

        .item-name { font-size: 0.9rem; font-weight: bold; margin-bottom: 10px; height: 35px; overflow: hidden; }

        .get-btn {
            background: #00ffcc;
            color: black;
            padding: 8px;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            width: 100%;
            cursor: pointer;
            font-size: 0.8rem;
        }

        /* KOD PANELİ (MODAL) */
        #codeModal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }

        .modal-box {
            background: #252525;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            border: 2px solid #00ffcc;
            width: 80%;
        }

        .copy-area {
            background: #111;
            padding: 15px;
            margin: 15px 0;
            font-family: monospace;
            color: #00ffcc;
            font-size: 1.2rem;
            border: 1px dashed #00ffcc;
        }

        /* ADBLOCK DUVARI */
        #blocker {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            z-index: 9999;
            color: white;
            text-align: center;
            padding-top: 100px;
        }

        .close-modal {
            margin-top: 15px;
            color: #888;
            cursor: pointer;
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div id="blocker">
        <h1>REKLAM ENGELLEYİCİ AÇIK!</h1>
        <p>Devam etmek için AdBlock kapatıp sayfayı yenile.</p>
    </div>

    <header>
        <div class="logo">RO-KOD KATALOG</div>
        <input type="text" id="search" placeholder="Ara..." onkeyup="filter()">
    </header>

    <div class="grid" id="mainGrid">
        </div>

    <div id="codeModal">
        <div class="modal-box">
            <h3>ÜCRETSİZ KODUNUZ</h3>
            <div class="copy-area" id="targetCode">KOD123</div>
            <p>Bu kodu kopyalayıp Roblox'ta kullanın!</p>
            <div class="close-modal" onclick="closeModal()">[ Kapat ]</div>
        </div>
    </div>

    <div class="ads" style="position:absolute; left:-9999px;">&nbsp;</div>

    <script>
        const items = [
            { name: "Mavi Kristal Yüz", code: "RBX-SMILE-2024", icon: "😎" },
            { name: "Neon Kulaklık", code: "SOUND-FREE-01", icon: "🎧" },
            { name: "Siyah Pelerin", code: "DARK-ROBE-88", icon: "🧥" },
            { name: "Güneş Gözlüğü", code: "SUN-GLASS-22", icon: "🕶️" },
            { name: "Siber Kask", code: "CYBER-HELM-10", icon: "🪖" },
            { name: "Hediye Paketi", code: "GIFT-BOX-PRO", icon: "🎁" }
        ];

        const grid = document.getElementById('mainGrid');

        function loadItems() {
            grid.innerHTML = items.map(item => `
                <div class="card">
                    <span class="item-icon">${item.icon}</span>
                    <div class="item-name">${item.name}</div>
                    <button class="get-btn" onclick="showCode('${item.code}')">KODU AL</button>
                </div>
            `).join('');
        }

        function showCode(code) {
            document.getElementById('targetCode').innerText = code;
            document.getElementById('codeModal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('codeModal').style.display = 'none';
        }

        function filter() {
            let val = document.getElementById('search').value.toLowerCase();
            let cards = document.querySelectorAll('.card');
            cards.forEach(c => {
                let name = c.querySelector('.item-name').innerText.toLowerCase();
                c.style.display = name.includes(val) ? "block" : "none";
            });
        }

        // ADBLOCK KONTROLÜ
        window.onload = function() {
            loadItems();
            setTimeout(() => {
                let ads = document.querySelector('.ads');
                if (!ads || ads.offsetParent === null) {
                    document.getElementById('blocker').style.display = 'block';
                }
            }, 500);
        }
    </script>
</body>
</html>
