<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Xerela Sunucusu</title>
  <style>
    body {
      background-color: #1a1a1a; 
      background-image: url('IMG_20260423_172129.png'); 
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      background-repeat: no-repeat;
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: sans-serif;
    }

    .container {
      background: rgba(0, 0, 0, 0.6); /* Biraz daha şeffaf yaptım resim görünsün diye */
      padding: 40px;
      border-radius: 20px;
      text-align: center;
      color: white;
      border: 1px solid rgba(255, 255, 255, 0.1);
      width: 80%;
      max-width: 350px;
    }

    h1 {
      margin: 0;
      font-size: 24px;
      letter-spacing: 1px;
    }

    .btn {
      display: inline-block;
      margin-top: 25px;
      padding: 15px 30px;
      background-color: #47a025;
      color: white;
      text-decoration: none;
      border-radius: 10px;
      font-weight: bold;
      transition: 0.3s;
      cursor: pointer;
      border: none;
      font-size: 16px;
      width: 100%;
    }

    .btn:hover {
      background-color: #5ad12f;
      transform: scale(1.05);
    }

    #statusText {
      display: block;
      margin-top: 15px;
      font-size: 14px;
      min-height: 20px;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>XERELA SUNUCUSU</h1>
    
    <button id="joinBtn" class="btn">SUNUCUYA KATIL</button>
    <span id="statusText"></span>
  </div>

  <script>
    const SUNUCU_IP = "xerela47.aternos.me";
    const btn = document.getElementById('joinBtn');
    const statusText = document.getElementById('statusText');

    function playClick() {
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        osc.connect(ctx.destination);
        osc.start(); 
        osc.stop(ctx.currentTime + 0.1);
      } catch(e) { console.log("Ses çalınmadı"); }
    }

    btn.addEventListener('click', () => {
      playClick();
      statusText.textContent = "Bağlanılıyor...";
      statusText.style.color = "#fbbf24";
      
      setTimeout(() => {
        // İşte o özel link, sistemi hiç bozmadan burada çalışıyor
        window.location.href = `minecraft://externalServer?name=Xerela&serverAddress=${SUNUCU_IP}&port=19132`;
        
        statusText.textContent = "Minecraft Açılıyor!";
        statusText.style.color = "#4ade80";
      }, 1000);
    });
  </script>
</body>
</html>
