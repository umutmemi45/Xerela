<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Xerela Sunucusu</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      background: #111;
      font-family: 'Press Start 2P', cursive;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
    }

    /* Telefon Çerçevesi */
    .phone-frame {
      width: 360px;
      height: 740px;
      border: 12px solid #222;
      border-radius: 45px;
      position: relative;
      overflow: hidden;
      box-shadow: 0 0 50px rgba(0,0,0,0.8);
      /* Yüklediğin resmi buraya bağlıyoruz */
      background-image: url('ekran_resmi.png');
      background-size: cover;
      background-position: center;
    }

    .notch {
      width: 60px;
      height: 18px;
      background: #222;
      border-bottom-left-radius: 15px;
      border-bottom-right-radius: 15px;
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
    }

    /* Yazı Alanı */
    .content {
      position: absolute;
      top: 35%;
      width: 100%;
      text-align: center;
      padding: 0 10px;
      box-sizing: border-box;
    }

    .title {
      font-size: 22px;
      color: #fff;
      text-transform: uppercase;
      text-shadow: 4px 4px 0px #373737;
      margin-bottom: 10px;
    }

    .subtitle {
      font-size: 9px;
      color: #ccc;
      text-shadow: 2px 2px 0px #000;
    }

    /* Buton Alanı */
    .footer {
      position: absolute;
      bottom: 50px;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .mc-button {
      width: 80%;
      padding: 18px;
      background: #6aaa49;
      border: 4px solid #1e4514;
      color: #fff;
      font-family: 'Press Start 2P', cursive;
      font-size: 11px;
      cursor: pointer;
      box-shadow: inset -4px -4px 0px #3e782a, inset 4px 4px 0px #8ed46b;
      transition: transform 0.05s;
    }

    .mc-button:active {
      transform: scale(0.95);
      background: #4e8a35;
    }

    .status-box {
      margin-top: 15px;
      font-size: 8px;
      color: #fff;
      background: rgba(0,0,0,0.6);
      padding: 8px;
      border-radius: 4px;
    }
  </style>
</head>
<body>

  <div class="phone-frame">
    <div class="notch"></div>
    
    <div class="content">
      <div class="title">XERELA<br>SUNUCUSU</div>
      <div class="subtitle">Sivas sunucusuna bağlanılıyor...</div>
    </div>

    <div class="footer">
      <button id="joinBtn" class="mc-button">SUNUCUYA KATIL</button>
      <div id="status" class="status-box">Durum: Hazır</div>
    </div>
  </div>

  <script>
    const btn = document.getElementById('joinBtn');
    const statusText = document.getElementById('status');

    // --- BURAYI SUNUCUNU KURUNCA GÜNCELLE ---
    const SUNUCU_IP = "senin_sunucu_adresin.aternos.me"; 
    // ---------------------------------------

    function playClick() {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const osc = ctx.createOscillator();
      const g = ctx.createGain();
      osc.type = 'square';
      osc.frequency.setValueAtTime(150, ctx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(40, ctx.currentTime + 0.1);
      g.gain.setValueAtTime(0.1, ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.1);
      osc.connect(g); g.connect(ctx.destination);
      osc.start(); osc.stop(ctx.currentTime + 0.1);
    }

    btn.addEventListener('click', () => {
      playClick();
      statusText.textContent = "Bağlanılıyor...";
      statusText.style.color = "#fbbf24";

      setTimeout(() => {
        // Minecraft'ı otomatik açmaya çalışan komut
        window.location.href = `minecraft://externalServer?name=Xerela&serverAddress=${SUNUCU_IP}&port=19132`;
        
        statusText.textContent = "Minecraft Açılıyor!";
        statusText.style.color = "#4ade80";
      }, 1200);
    });
  </script>
</body>
</html>
