<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>Xerela Sunucusu</title>
  <style>
    body {
      margin: 0;
      font-family: 'Arial', sans-serif;
      background: url('minecraft-bg.jpg') no-repeat center center fixed;
      background-size: cover;
      color: #fff;
      text-align: center;
    }
    .container {
      position: relative;
      top: 30%;
      transform: translateY(-30%);
    }
    h1 {
      font-size: 3em;
      text-shadow: 2px 2px 5px #000;
    }
    p {
      font-size: 1.2em;
      margin: 10px 0;
      text-shadow: 1px 1px 3px #000;
    }
    button {
      padding: 15px 30px;
      font-size: 1.2em;
      background: #2ecc71;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: 0.3s;
    }
    button:hover {
      background: #27ae60;
      transform: scale(1.05);
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Xerela Sunucusu</h1>
    <p>Sivas sunucusuna bağlanılıyor...</p>
    <button onclick="playSound()">SUNUCUYA KATIL</button>
  </div>

  <audio id="joinSound" src="join.mp3"></audio>
  <script>
    function playSound() {
      document.getElementById('joinSound').play();
      alert("Sunucuya bağlanılıyor!");
    }
  </script>
</body>
</html>
