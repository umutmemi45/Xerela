<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Xerela Sunucusu</title>
  <style>
    /* Minecraft tarzı taş fontu */
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

    body {
      background-color: #1a1a1a; 
      background-image: url('IMG_20260423_172129.png'); 
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      background-repeat: no-repeat;
      margin: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between; /* İsim tepede, buton işaretlediğin yerde */
      height: 100vh;
      overflow: hidden;
      font-family: sans-serif;
    }

    /* Üst taraftaki taş efektli isim */
    h1 {
      margin-top: 10vh; /* İşaretlediğin üst boşluğa denk gelir */
      font-family: 'Press Start 2P', cursive;
      font-size: 28px;
      color: #bfbfbf; /* Taş rengi */
      text-transform: uppercase;
      text-shadow: 
        3px 3px 0 #333,
        -1px -1px 0 #eee; /* Kabartma efekti */
    }

    /* Alt taraftaki buton alanı */
    .btn-container {
      margin-bottom: 12vh; /* İşaretlediğin çimenli toprağın tam üzerine denk getirir */
      width: 100%;
      display: flex;
      justify-content: center;
    }

    .btn {
      width: 80%;
      max-width: 320px;
      padding: 12px; /* Daha zarif ve ince olması için kıstım */
      background-color: #47a025;
      color: white;
      text-decoration: none;
      border-radius: 5px; /* Daha modern ve zarif köşe */
      font-weight: bold;
      transition: 0.2s;
      cursor: pointer;
      border: 2px solid #2a6116;
      font-size: 14px; /* Zarif durması için yazı boyutunu ayarladım */
      text-transform: uppercase;
      letter-spacing: 1px;
      box-shadow: 0 4px 0 #2a6116;
    }

    .btn:hover {
      background-color: #5ad12f;
      transform: scale(1.02);
    }

    .btn:active {
      transform: translateY(2px);
      box-shadow: 0 2px 0 #2a6116;
    }

    #statusText {
      position: absolute;
      bottom: 5vh;
      color: white;
      font-size: 12px;
      font-weight: bold;
      background: rgba(0,0,0,0.3);
      padding: 2px 10px;
      border-radius: 10px;
    }
  </style>
</head>
<body>

  <h1>XERELA</h1>
  
  <div class="btn-container">
    <button id="joinBtn" class="btn">SUNUCUYA KATIL</button>
  </div>
  
  <span id="statusText"></span>

  <script>
    const SUNUCU_IP = "xerela47.aternos.me";
    const btn = document.getElementById('joinBtn');
    const statusText = document.getElementById('statusText');

    function playClick() {
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        osc.connect(ctx.destination);
        osc.start(); 
        osc.stop(ctx.currentTime + 0.1);
      } catch(e) { console.log("Ses çalınmadı"); }
    }

    btn.addEventListener('click', () => {
      playClick();
      statusText.textContent = "BAĞLANILIYOR...";
      statusText.style.color = "#fbbf24";
      
      setTimeout(() => {
        window.location.href = `minecraft://externalServer?name=Xerela&serverAddress=${SUNUCU_IP}&port=19132`;
        statusText.textContent = "MINECRAFT AÇILIYOR!";
        statusText.style.color = "#4ade80";
      }, 1000);
    });
  </script>
</body>
</html>
