<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Xerela Sunucusu</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      padding: 0;
      /* ARKA PLAN BURADA: Dosya adını ekran_resmi.png olarak güncelledim */
      background: #111 url('ekran_resmi.png') no-repeat center center fixed;
      background-size: cover;
      font-family: 'Press Start 2P', cursive;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
    }

    /* Görselin üzerine hafif bir karartma katmanı */
    body::before {
      content: "";
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.4);
      z-index: -1;
    }

    .content {
      text-align: center;
      z-index: 1;
      margin-bottom: 60px;
    }

    .title {
      font-size: 26px;
      color: #fff;
      text-transform: uppercase;
      text-shadow: 5px 5px 0px #373737, 2px 2px 15px rgba(0,0,0,0.5);
      margin-bottom: 15px;
      line-height: 1.3;
    }

    .subtitle {
      font-size: 10px;
      color: #ddd;
      background: rgba(0,0,0,0.5);
      padding: 5px 10px;
      display: inline-block;
      border-radius: 4px;
    }

    .footer {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      z-index: 1;
    }

    .mc-button-wrapper {
      position: relative;
      width: 85%;
      max-width: 380px;
      display: flex;
      align-items: center;
    }

    .dirt-block {
      position: absolute;
      left: 10px;
      width: 35px;
      height: 35px;
      background-image: url('https://minecraft.wiki/images/Thumb_Dirt_Path_JE2_BE2.png'); 
      background-size: contain;
      background-repeat: no-repeat;
      z-index: 2;
      image-rendering: pixelated; 
    }

    .mc-button {
      width: 100%;
      padding: 22px 20px 22px 55px;
      background: #6aaa49;
      border: 4px solid #1e4514;
      color: #fff;
      font-family: 'Press Start 2P', cursive;
      font-size: 12px;
      cursor: pointer;
      box-shadow: inset -4px -4px 0px #3e782a, inset 4px 4px 0px #8ed46b, 0 10px 20px rgba(0,0,0,0.3);
      text-align: left;
      transition: all 0.1s;
    }

    .mc-button:active {
      transform: scale(0.98);
      background: #4e8a35;
      box-shadow: inset 4px 4px 0px #1e4514;
    }

    .status-box {
      margin-top: 20px;
      font-size: 9px;
      color: #fff;
      background: rgba(0,0,0,0.8);
      padding: 12px 25px;
      border: 2px solid #555;
      border-radius: 2px;
    }
  </style>
</head>
<body>

    <div class="content">
      <div class="title">XERELA<br>SUNUCUSU</div>
      <div class="subtitle">Sivas sunucusuna bağlanılıyor...</div>
    </div>

    <div class="footer">
      <div class="mc-button-wrapper">
        <div class="dirt-block"></div>
        <button id="joinBtn" class="mc-button">SUNUCUYA KATIL</button>
      </div>
      <div id="status" class="status-box">Durum: Hazır</div>
    </div>

  <script>
    const btn = document.getElementById('joinBtn');
    const statusText = document.getElementById('status');
    
    // BURAYA KENDİ SUNUCU IP ADRESİNİ YAZMAYI UNUTMA KANKA
    const SUNUCU_IP = "Xerela.aternos.me"; 

    function playClick() {
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const g = ctx.createGain();
        osc.type = 'square';
        osc.frequency.setValueAtTime(150, ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(40, ctx.currentTime + 0.1);
        g.gain.setValueAtTime(0.1, ctx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.1);
        osc.connect(g); g.connect(ctx.destination);
        osc.start(); osc.stop(ctx.currentTime + 0.1);
      } catch(e) { console.log("Ses çalınamadı"); }
    }

    btn.addEventListener('click', () => {
      playClick();
      statusText.textContent = "Bağlanılıyor...";
      statusText.style.color = "#fbbf24";
      setTimeout(() => {
        window.location.href = `minecraft://externalServer?name=Xerela&serverAddress=${SUNUCU_IP}&port=19132`;
        statusText.textContent = "Minecraft Açılıyor!";
        statusText.style.color = "#4ade80";
      }, 1000);
    });
  </script>
</body>
</html>
