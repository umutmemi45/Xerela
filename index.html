<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BOTANIST PRO - V8.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --ana: #0a3d1d; --vurgu: #2e7d32; --arka: #f4f7f4; --beyaz: #ffffff; }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent; 
            outline: none !important;
            border: none;
        }

        body { margin: 0; padding: 0; background: var(--arka); font-family: 'Montserrat', sans-serif; }

        /* ÜST PANEL */
        .ust-panel {
            background: var(--beyaz); padding: 15px 20px;
            display: flex; align-items: center;
            border-bottom: 5px solid var(--ana);
            position: sticky; top: 0; z-index: 1000;
        }

        .geri-ok {
            font-size: 35px; cursor: pointer; color: var(--ana);
            margin-right: 15px; display: none; line-height: 1;
        }

        .logo { font-family: 'Playfair Display', serif; font-size: 24px; font-weight: 900; color: var(--ana); }

        /* KARTLAR */
        .grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px; padding: 20px; max-width: 1200px; margin: 0 auto;
        }

        .kart {
            background: white; border-radius: 20px; overflow: hidden;
            cursor: pointer; border: 1px solid #eee;
        }

        .kart img { width: 100%; height: 200px; object-fit: cover; background: #eee; }
        .kart h3 { padding: 15px; text-align: center; color: var(--ana); margin: 0; }

        /* DETAY */
        #detay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: white; z-index: 2000; overflow-y: auto;
        }

        .banner { width: 100%; height: 300px; object-fit: cover; }
        .icerik { max-width: 700px; margin: 0 auto; padding: 25px 20px 150px 20px; }
        .kutu { background: #f9fbf9; border-left: 6px solid var(--vurgu); padding: 20px; margin-bottom: 15px; border-radius: 10px; }

        /* SES BUTONU - EN ALTA ÇİVİLİ */
        .ses-bar {
            position: fixed; bottom: 0; left: 0; width: 100%;
            background: white; padding: 20px; text-align: center;
            border-top: 1px solid #eee; box-shadow: 0 -5px 15px rgba(0,0,0,0.05);
        }

        .oku-btn {
            background: var(--ana); color: white; 
            padding: 18px 45px; border-radius: 50px; 
            font-size: 18px; font-weight: bold; cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="ust-panel">
        <div class="geri-ok" id="geri" onclick="kapat()">⬅</div>
        <div class="logo">BOTANIST PRO</div>
    </div>

    <div id="ana">
        <div style="padding:20px; text-align:center;">
            <input type="text" id="arama" placeholder="Ara..." style="width:90%; padding:15px; border-radius:30px; border:1px solid #ddd;">
        </div>
        <div class="grid" id="grid"></div>
    </div>

    <div id="detay">
        <img id="dImg" class="banner">
        <div class="icerik">
            <h1 id="dBas" style="color:var(--ana); font-family:'Playfair Display';"></h1>
            <div id="dYaz"></div>
        </div>
        <div class="ses-bar">
            <button class="oku-btn" id="okuBtn">🔊 REHBERİ DİNLE</button>
        </div>
    </div>

<script>
    const meyveler = ["Elma", "Armut", "Ayva", "Muz", "Çilek", "Kiraz", "Vişne", "Erik", "Kayısı", "Şeftali", "Nektarin", "Üzüm", "İncir", "Nar", "Karpuz", "Kavun", "Portakal", "Mandalina", "Limon", "Greyfurt", "Turunç", "Lime", "Ananas", "Avokado", "Mango", "Papaya", "Hindistan Cevizi", "Ejder Meyvesi", "Kivi", "Yaban Mersini", "Ahududu", "Böğürtlen", "Frenk Üzümü", "Bektaşi Üzümü", "Kızılcık", "Hünnap", "Muşmula", "Yenidünya", "Trabzon Hurması", "İğde", "Dut", "Karadut", "Goji Berry", "Çarkıfelek", "Guava", "Litchi", "Rambutan", "Mangosten", "Durian", "Yıldız Meyvesi", "Jackfruit", "Ekmek Ağacı", "Tamarillo", "Feijoa", "Nashi", "Physalis", "Pepino", "Kudret Narı", "Demirhindi", "Pomelo", "Kumkuat", "Bergamot", "Salak", "Açai", "Acerola", "Cherimoya", "Soursop", "Longan", "Noni", "Calamansi", "Santol", "Marula", "Baobab", "Cempedak", "Mucize Meyve", "Jujube", "Medlar", "Quince", "Bilberry", "Elderberry", "Cloudberry", "Boysenberry", "Loganberry", "Mulberry", "Star Apple", "Sapodilla", "Mamey Sapote", "Cupuaçu", "Jabuticaba", "Surinam Kirazı", "Kaju Elması", "Ackee", "Sloe", "Damson", "Rose Apple", "Jambolan", "Bael", "Wood Apple", "Custard Apple", "Sugar Apple", "Persimmon", "Pomegranate", "Hurma", "Frenk İnciri", "Tuna", "Boynuzlu Kavun", "Ugli Fruit", "Tangelo", "Satsuma", "Budha Eli", "Finger Lime", "Yuzu", "Sudachi", "Clementine", "Sweetie", "Jostaberry", "Marionberry", "Dewberry", "Salmonberry", "Thimbleberry", "Wineberry", "Hackberry", "Çırçan", "Rowanberry", "Serviceberry", "Huckleberry", "Buffalo Berry", "Chokeberry", "Aronya"];

    const grid = document.getElementById('grid');
    let metin = "";

    // SES MOTORUNU GÜVENLİ BAŞLATMA
    function getSynth() {
        return window.speechSynthesis || null;
    }

    function listele(f = "") {
        grid.innerHTML = "";
        meyveler.filter(m => m.toLowerCase().includes(f.toLowerCase())).forEach(m => {
            const k = document.createElement('div');
            k.className = 'kart';
            const yol = `img/${m.toLowerCase()}.jpg`;
            k.innerHTML = `<img src="${yol}" onerror="this.src='https://source.unsplash.com/400x300/?${m},fruit'"><h3>${m}</h3>`;
            k.onclick = () => ac(m, yol);
            grid.appendChild(k);
        });
    }

    function ac(n, i) {
        document.getElementById('dImg').src = i;
        document.getElementById('dBas').innerText = n;
        const h = `<div class="kutu"><b>🌿 BOTANİK:</b><p>${n} hakkında uzman yetiştirme bilgileri burada yer alır.</p></div>
                   <div class="kutu"><b>📅 HASAT:</b><p>En uygun meyve kalitesi için mevsiminde toplanmalıdır.</p></div>`;
        document.getElementById('dYaz').innerHTML = h;
        metin = h.replace(/<[^>]*>/g, '');
        
        document.getElementById('detay').style.display = "block";
        document.getElementById('geri').style.display = "block";
        window.scrollTo(0,0);
        
        // KRİTİK: İlk tıklamada ses motorunu sessizce uyandırıyoruz (Kilit Kırıcı)
        let s = getSynth();
        if(s) s.cancel();
    }

    function kapat() {
        document.getElementById('detay').style.display = "none";
        document.getElementById('geri').style.display = "none";
        let s = getSynth();
        if(s) s.cancel();
    }

    document.getElementById('okuBtn').onclick = () => {
        let s = getSynth();
        if (!s) return;
        
        s.cancel(); // Önce temizle
        
        const u = new SpeechSynthesisUtterance(metin);
        u.lang = 'tr-TR';
        u.rate = 1.0;
        
        // Bazı tarayıcılarda sesin yüklenmesi için 100ms bekletiyoruz
        setTimeout(() => { s.speak(u); }, 100);
    };

    document.getElementById('arama').oninput = (e) => listele(e.target.value);
    listele();
</script>
</body>
</html>
