<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Xerela Sunucusu</title>
  <style>
    /* Google Fonts'tan Minecraft'a benzeyen bir font çektim */
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

    body {
      background-color: #1a1a1a; 
      /* Arka plan resmin duruyor */
      background-image: url(''); 
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      background-repeat: no-repeat;
      margin: 0;
      /* O siyah çerçeveyi kaldırmak için container'ı sildim, her şeyi body'e ortaladım */
      display: flex;
      flex-direction: column; /* Üst üste gelmeleri için */
      align-items: center;
      justify-content: space-between; /* İsim tepede, buton dipte olsun diye */
      height: 100vh;
      padding: 5vh 0; /* Tepeden ve dipten biraz boşluk */
    }

    h1 {
      margin: 0;
      /* İşte o Minecraft taş efekti */
      font-family: 'Press Start 2P', cursive;
      font-size: 32px; /* Daha büyük ve net */
      color: #b0b0b0; /* Taş grisi */
      text-transform: uppercase;
      letter-spacing: 2px;
      /* 3D ve gölge efekti */
      text-shadow: 
        2px 2px 0 #000,
        -2px -2px 0 #000,
        2px -2px 0 #000,
        -2px 2px 0 #000,
        0px 2px 0 #000,
        0px -2px 0 #000,
        2px 0px 0 #000,
        -2px 0px 0 #000,
        4px 4px 0 #555; /* Taş detayı */
    }

    .btn-container {
        width: 100%;
        display: flex;
        justify-content: center;
        padding-bottom: 5vh; /* Alttan boşluk */
    }

    .btn {
      /* Butonu kocaman yaptık */
      width: 90%; 
      max-width: 600px;
      padding: 25px; /* Daha kalın ve büyük */
      background-color: #47a025;
      color: white;
      text-decoration: none;
      border-radius: 15px; /* Hafif yuvarlak */
      font-weight: bold;
      transition: 0.3s;
      cursor: pointer;
      border: 4px solid #2a6116; /* Koyu yeşil çerçeve */
      font-size: 24px; /* Yazı da büyüdü */
      font-family: sans-serif;
      text-align: center;
      box-shadow: 0 8px 0 #2a6116; /* Minecraft buton gölgesi */
    }

    .btn:hover {
      background-color: #5ad12f;
      transform: translateY(2px); /* Basılma efekti */
      box-shadow: 0 6px 0 #2a6116;
    }

    .btn:active {
        transform: translateY(6px); /* Tam basılma efekti */
        box-shadow: 0 2px 0 #2a6116;
    }

    #statusText {
      position: absolute;
      bottom: 2vh;
      color: white;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <h1>XERELA</h1>
  
  <div class="btn-container">
    <button id="joinBtn" class="btn">SUNUCUYA KATIL</button>
  </div>
  
  <span id="statusText"></span>

  <script>
    const SUNUCU_IP = "xerela47.aternos.me";
    const btn = document.getElementById('joinBtn');
    const statusText = document.getElementById('statusText');

    function playClick() {
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        osc.connect(ctx.destination);
        osc.start(); 
        osc.stop(ctx.currentTime + 0.1);
      } catch(e) { console.log("Ses çalınmadı"); }
    }

    btn.addEventListener('click', () => {
      playClick();
      statusText.textContent = "Bağlanılıyor...";
      statusText.style.color = "#fbbf24";
      
      setTimeout(() => {
        // Özel link
        window.location.href = `minecraft://externalServer?name=Xerela&serverAddress=${SUNUCU_IP}&port=19132`;
        
        statusText.textContent = "Minecraft Açılıyor!";
        statusText.style.color = "#4ade80";
      }, 1000);
    });
  </script>
</body>
</html>
