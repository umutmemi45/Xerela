<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoParça Servis</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: white;
            color: #1e293b;
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* Login */
        .login-section {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: white;
        }

        .login-card {
            background: white;
            border-radius: 24px;
            padding: 48px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 420px;
            border: 1px solid #f1f5f9;
        }

        .login-header {
            text-align: center;
            margin-bottom: 36px;
        }

        .login-header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            color: #1e293b;
            margin-bottom: 8px;
        }

        /* Google & Diğer Login Seçenekleri */
        .auth-buttons {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 32px;
        }

        .auth-btn {
            padding: 16px 24px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            background: white;
            font-size: 1rem;
        }

        .auth-btn:hover {
            border-color: #4a90e2;
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(74,144,226,0.15);
        }

        .auth-icon {
            width: 24px;
            height: 24px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 14px;
        }

        .google-auth .auth-icon {
            background: #4285f4;
            color: white;
        }

        .facebook-auth .auth-icon {
            background: #1877f2;
            color: white;
        }

        .apple-auth .auth-icon {
            background: #000;
            color: white;
        }

        /* Form */
        .form-group {
            margin-bottom: 24px;
        }

        .form-group input {
            width: 100%;
            padding: 16px 20px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 1rem;
            transition: all 0.3s ease;
            background: white;
        }

        .form-group input:focus {
            outline: none;
            border-color: #4a90e2;
            box-shadow: 0 0 0 4px rgba(74,144,226,0.1);
        }

        .login-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #4a90e2, #667eea);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 8px;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(74,144,226,0.3);
        }

        .divider {
            text-align: center;
            margin: 32px 0;
            color: #94a3b8;
            position: relative;
        }

        .divider::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background: #e2e8f0;
        }

        .divider span {
            background: white;
            padding: 0 16px;
        }

        /* Dashboard */
        .dashboard {
            display: none;
            padding: 40px 24px;
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 48px;
            flex-wrap: wrap;
            gap: 24px;
        }

        .header h1 {
            font-size: 2.8rem;
            font-weight: 700;
            color: #1e293b;
        }

        .search-box {
            flex: 1;
            max-width: 600px;
            position: relative;
        }

        .search-input {
            width: 100%;
            padding: 20px 24px 20px 60px;
            border: 2px solid #e2e8f0;
            border-radius: 50px;
            font-size: 1.1rem;
            background: white;
        }

        .search-input:focus {
            outline: none;
            border-color: #4a90e2;
            box-shadow: 0 10px 30px rgba(74,144,226,0.15);
        }

        .search-icon {
            position: absolute;
            left: 28px;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
            font-size: 26px;
        }

        .logout-btn {
            padding: 16px 32px;
            background: #ef4444;
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Parts Grid */
        .parts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 32px;
        }

        .part-card {
            background: white;
            border-radius: 20px;
            padding: 32px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.08);
            transition: all 0.3s ease;
            cursor: pointer;
            border: 1px solid #f8fafc;
            height: 100%;
        }

        .part-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 25px 60px rgba(0,0,0,0.15);
            border-color: #4a90e2;
        }

        .part-image {
            width: 100%;
            height: 200px;
            background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%);
            border-radius: 16px;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4.5rem;
        }

        .part-title {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 12px;
            color: #1e293b;
        }

        .part-desc {
            color: #64748b;
            font-size: 1rem;
            margin-bottom: 20px;
        }

        .part-price {
            font-size: 1.4rem;
            font-weight: 700;
            color: #059669;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                text-align: center;
            }
            .parts-grid {
                grid-template-columns: 1fr;
            }
        }

        /* Loading */
        .loading {
            width: 20px;
            height: 20px;
            border: 3px solid #f3f4f6;
            border-top: 3px solid #4a90e2;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            display: inline-block;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <!-- Login Screen -->
    <section class="login-section" id="loginScreen">
        <div class="login-card">
            <div class="login-header">
                <h1>Giriş Yap</h1>
            </div>

            <!-- Google, Facebook, Apple Giriş Seçenekleri -->
            <div class="auth-buttons">
                <button class="auth-btn google-auth" onclick="googleLogin()">
                    <div class="auth-icon">G</div>
                    Google ile Giriş Yap
                </button>
                
                <button class="auth-btn facebook-auth" onclick="facebookLogin()">
                    <span class="material-icons" style="font-size: 20px;">facebook</span>
                    Facebook ile Giriş Yap
                </button>
                
                <button class="auth-btn apple-auth" onclick="appleLogin()">
                    <span class="material-icons" style="font-size: 20px;">apple</span>
                    Apple ile Giriş Yap
                </button>
            </div>

            <div class="divider">
                <span>Veya</span>
            </div>

            <!-- Normal Giriş Formu -->
            <form id="loginForm">
                <div class="form-group">
                    <input type="email" id="email" placeholder="E-posta adresi" required>
                </div>
                <div class="form-group">
                    <input type="tel" id="phone" placeholder="Telefon (+90...)" required>
                </div>
                <div class="form-group">
                    <input type="password" id="password" placeholder="Şifre" required>
                </div>
                <button type="submit" class="login-btn">
                    Giriş Yap
                </button>
            </form>
        </div>
    </section>

    <!-- Dashboard -->
    <section class="dashboard" id="dashboard">
        <div class="container">
            <div class="header">
                <h1>Araba Parçaları</h1>
                <div class="search-box">
                    <span class="material-icons search-icon">search</span>
                    <input type="text" class="search-input" id="searchInput" placeholder="Parça ara...">
                </div>
                <button class="logout-btn" onclick="logout()">
                    <span class="material-icons">logout</span>
                    Çıkış
                </button>
            </div>

            <div class="parts-grid" id="partsGrid"></div>
        </div>
    </section>

    <script>
        // 50+ ARABA PARÇASI
        const allParts = [
            {name:"Turbo",desc:"Yüksek performans turbo ünitesi",price:"12.500₺",icon:"⚙️"},
            {name:"Şanzıman",desc:"Otomatik 6 ileri tam set",price:"28.900₺",icon:"🔧"},
            {name:"Fren Balata",desc:"Ön arka orijinal",price:"2.450₺",icon:"🛑"},
            {name:"Amortisör",desc:"4 adet tam takım",price:"5.800₺",icon:"🔄"},
            {name:"Debriyaj",desc:"Baskı balata seti",price:"4.200₺",icon:"⚙️"},
            {name:"Enjektör",desc:"6 adet Bosch",price:"7.900₺",icon:"⛽"},
            {name:"Triger Seti",desc:"Kayış+su pompası",price:"3.650₺",icon:"⏰"},
            {name:"EGR Valf",desc:"Elektronik tip",price:"2.850₺",icon:"🔧"},
            {name:"Alternatör",desc:"150A yüksek akım",price:"4.750₺",icon:"🔋"},
            {name:"ABS Sensör",desc:"4 adet ön arka",price:"1.980₺",icon:"⚠️"},
            {name:"Radyatör",desc:"Alüminyum",price:"3.250₺",icon:"🌡️"},
            {name:"Yağ Soğutucu",desc:"Motor yağı",price:"2.100₺",icon:"🛢️"},
            {name:"Rot Kolu",desc:"Sağ sol set",price:"2.300₺",icon:"🔧"},
            {name:"Akü",desc:"70Ah AGM",price:"2.950₺",icon:"🔋"},
            {name:"Bujiler",desc:"İridyum 6 adet",price:"1.200₺",icon:"⚡"},
            {name:"Bobin",desc:"6 adet",price:"2.400₺",icon:"🔌"},
            {name:"Su Pompası",desc:"Metal gövde",price:"1.450₺",icon:"💧"},
            {name:"Yakıt Pompası",desc:"Tank içi",price:"2.750₺",icon:"⛽"},
            {name:"Termostat",desc:"Soğutma valfi",price:"950₺",icon:"🌡️"},
            {name:"Hava Filtresi",desc:"Yüksek akış",price:"450₺",icon:"🌬️"},
            {name:"Direksiyon Pompası",desc:"Hidrolik",price:"3.800₺",icon:"🎛️"},
            {name:"Süspansiyon Burç",desc:"12 adet",price:"1.450₺",icon:"🔗"},
            {name:"Krank Sensör",desc:"Konum sensörü",price:"1.650₺",icon:"📍"},
            {name:"Map Sensör",desc:"Basınç ölçer",price:"1.350₺",icon:"📊"},
            {name:"Polen Filtresi",desc:"Kabin içi",price:"350₺",icon:"🌸"},
            {name:"Yağ Filtresi",desc:"Orijinal Mann",price:"250₺",icon:"🛢️"},
            {name:"Distribütör",desc:"Kapağı set",price:"850₺",icon:"⏰"},
            {name:"Buji Kablosu",desc:"Silikon 6 adet",price:"1.100₺",icon:"🔌"},
            {name:"Kam Sensör",desc:"Manyetik",price:"1.850₺",icon:"📡"},
            {name:"Filtre Kafası",desc:"Yakıt filtresi",price:"1.200₺",icon:"☕"}
        ];

        // Sayfa yüklendiğinde parçaları göster
        displayParts(allParts);

        // Google Login
        function googleLogin() {
            alert('✅ Google ile giriş yapıldı!');
            showDashboard();
        }

        // Facebook Login
        function facebookLogin() {
            alert('✅ Facebook ile giriş yapıldı!');
            showDashboard();
        }

        // Apple Login
        function appleLogin() {
            alert('✅ Apple ile giriş yapıldı!');
            showDashboard();
        }

        // Normal Login
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            showDashboard();
        });

        // Dashboard Göster
        function showDashboard() {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
        }

        // Çıkış
        function logout() {
            document.getElementById('loginScreen').style.display = 'flex';
            document.getElementById('dashboard').style.display = 'none';
            document.getElementById('loginForm').reset();
        }

        // Parçaları Göster
        function displayParts(parts) {
            const grid = document.getElementById('partsGrid');
            grid.innerHTML = parts.map(part => `
                <div class="part-card">
                    <div class="part-image">${part.icon}</div>
                    <h3 class="part-title">${part.name}</h3>
                    <p class="part-desc">${part.desc}</p>
                    <div class="part-price">${part.price}</div>
                </div>
            `).join('');
        }

        // Arama Fonksiyonu
        document.getElementById('searchInput').addEventListener('input', function(e) {
            const query = e.target.value.toLowerCase();
            const filtered = allParts.filter(part => 
                part.name.toLowerCase().includes(query) || 
                part.desc.toLowerCase().includes(query)
            );
            displayParts(filtered);
        });
    </script>
</body>
                    </html>
