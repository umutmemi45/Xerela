<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Benim Dünyam</title>
    <style>
        body {
            /* Arka plan ayarları burada */
            background-image: url('resim_1776954324758.jpeg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .main-box {
            background: rgba(0, 0, 0, 0.7); /* Yazılar net görünsün diye hafif karartma */
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            color: white;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
        }

        .btn-minecraft {
            display: inline-block;
            background-color: #47a025; /* Minecraft yeşili */
            color: white;
            padding: 15px 30px;
            text-decoration: none;
            font-weight: bold;
            border-radius: 5px;
            margin-top: 20px;
            border-bottom: 4px solid #2e6617;
        }

        .btn-minecraft:hover {
            background-color: #56c22d;
        }
    </style>
</head>
<body>

    <div class="main-box">
        <h1>Hoş Geldin!</h1>
        <p>Sitemiz başarıyla geri yüklendi.</p>
        <a href="https://www.minecraft.net" class="btn-minecraft">MINECRAFT'A GİT</a>
    </div>

</body>
</html>
