<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Xerela Sunucusu</title>

  <!-- Pixel / Minecraft tarzı font (Google Fonts) -->
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

  <style>
    /* ---------- Reset ---------- */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html,body { height: 100%; }
    body {
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial;
      background: linear-gradient(#7ec0ee 0%, #7ec0ee 40%, #6bb24a 40%, #6bb24a 60%, #3b7a2f 60%, #3b7a2f 100%);
      color: #fff;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      overflow-x: hidden;
    }

    /* ---------- Page layout ---------- */
    .stage {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      position: relative;
    }

    /* ---------- Minecraft-like layered background using SVG pattern ---------- */
    .bg {
      position: absolute;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      display: grid;
      grid-template-rows: 1fr auto;
    }

    /* Sky with sun */
    .sky {
      background: linear-gradient(180deg, #87ceeb 0%, #7ec0ee 50%, #f6d6a8 100%);
      position: relative;
      overflow: hidden;
    }
    .sun {
      position: absolute;
      right: 8%;
      top: 8%;
      width: 140px;
      height: 140px;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, #fff3b0 0%, #ffd36b 30%, #ffb84d 60%, rgba(255,184,77,0) 100%);
      filter: blur(6px);
      transform: translateY(0);
      animation: sunFloat 8s ease-in-out infinite;
    }
    @keyframes sunFloat {
      0% { transform: translateY(0); }
      50% { transform: translateY(6px); }
      100% { transform: translateY(0); }
    }

    /* Blocky terrain strip */
    .terrain {
      background-image:
        linear-gradient(90deg, rgba(0,0,0,0.06) 1px, transparent 1px),
        linear-gradient(#6bb24a, #4f8f2f);
      background-size: 40px 40px, 100% 100%;
      height: 160px;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding-bottom: 12px;
      box-shadow: inset 0 8px 30px rgba(0,0,0,0.25);
    }

    /* Ground blocks (pixel grid) */
    .blocks {
      width: min(1100px, 92%);
      height: 120px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(40px, 1fr));
      gap: 0;
      transform: translateY(6px);
    }
    .block {
      height: 120px;
      background: linear-gradient(#7bbf4a, #5fa033);
      border-right: 2px solid rgba(0,0,0,0.12);
      box-shadow: inset 0 -8px 0 rgba(0,0,0,0.08);
      position: relative;
    }
    .block::after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 36px;
      background: linear-gradient(#8b5a2b, #6b3f1a);
      border-top: 2px solid rgba(255,255,255,0.03);
    }

    /* ---------- Card (phone mockup) ---------- */
    .card {
      position: relative;
      z-index: 2;
      width: min(420px, 92%);
      max-width: 420px;
      background: linear-gradient(180deg, rgba(255,255,255,0.06), rgba(0,0,0,0.06));
      border-radius: 28px;
      padding: 18px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.45), 0 6px 18px rgba(0,0,0,0.25);
      backdrop-filter: blur(6px);
      border: 1px solid rgba(255,255,255,0.06);
      overflow: hidden;
    }

    /* Phone screen area */
    .phone-screen {
      background: linear-gradient(180deg, #0b1220 0%, #0f1724 100%);
      border-radius: 16px;
      padding: 18px;
      min-height: 520px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      position: relative;
      overflow: hidden;
    }

    /* In-screen background: stylized Minecraft scene using SVG */
    .in-screen-bg {
      position: absolute;
      inset: 0;
      z-index: 0;
      opacity: 0.95;
      display: grid;
      grid-template-rows: 1fr auto;
    }
    .in-screen-sky {
      background: linear-gradient(180deg, #7ec0ee 0%, #f6d6a8 70%);
      position: relative;
    }
    .in-screen-terrain {
      background: linear-gradient(#6bb24a, #3b7a2f);
      height: 160px;
      display: flex;
      align-items: flex-end;
      justify-content: center;
    }

    /* Title and description */
    .title {
      position: relative;
      z-index: 2;
      margin-top: 28px;
      font-family: 'Press Start 2P', monospace;
      font-size: 20px;
      letter-spacing: 1px;
      color: #fff;
      text-transform: uppercase;
      text-shadow: 0 6px 18px rgba(0,0,0,0.6), 0 1px 0 rgba(255,255,255,0.03);
    }
    .subtitle {
      position: relative;
      z-index: 2;
      margin-top: 12px;
      color: #e6f7ff;
      font-size: 12px;
      opacity: 0.95;
      text-shadow: 0 2px 6px rgba(0,0,0,0.45);
    }

    /* Character (SVG) container */
    .character-wrap {
      position: relative;
      z-index: 2;
      width: 220px;
      height: 220px;
      margin-top: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      filter: drop-shadow(0 18px 30px rgba(0,0,0,0.6));
    }

    /* Join button (3D blocky) */
    .join-button {
      position: relative;
      z-index: 2;
      margin: 22px 0 12px 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 14px 22px;
      background: linear-gradient(180deg,#ff9a3c 0%, #ff7a1a 100%);
      color: #fff;
      font-weight: 700;
      font-family: 'Press Start 2P', monospace;
      font-size: 12px;
      text-transform: uppercase;
      border-radius: 10px;
      border: 3px solid rgba(0,0,0,0.25);
      box-shadow: 0 10px 0 rgba(0,0,0,0.35), 0 18px 40px rgba(0,0,0,0.45);
      cursor: pointer;
      user-select: none;
      transition: transform 160ms cubic-bezier(.2,.9,.3,1), box-shadow 160ms;
      transform-origin: center;
    }
    .join-button:active { transform: translateY(6px); box-shadow: 0 4px 0 rgba(0,0,0,0.35); }

    /* Small status pill */
    .status-pill {
      position: relative;
      z-index: 2;
      display: inline-block;
      margin-top: 8px;
      padding: 6px 10px;
      background: rgba(0,0,0,0.28);
      border-radius: 999px;
      font-size: 11px;
      color: #dff7ff;
      border: 1px solid rgba(255,255,255,0.03);
      text-shadow: 0 1px 0 rgba(0,0,0,0.4);
    }

    /* Block-shatter effect container */
    .shatter-layer {
      position: absolute;
      z-index: 3;
      inset: 0;
      pointer-events: none;
      overflow: visible;
    }
    .shard {
      position: absolute;
      width: 28px;
      height: 28px;
      background: linear-gradient(#ff9a3c, #ff7a1a);
      transform-origin: center;
      opacity: 0;
      will-change: transform, opacity;
    }

    /* Footer small text */
    .footer {
      position: relative;
      z-index: 2;
      font-size: 10px;
      color: rgba(255,255,255,0.7);
      margin-bottom: 8px;
      text-align: center;
    }

    /* Responsive tweaks */
    @media (max-width: 520px) {
      .card { border-radius: 18px; padding: 12px; }
      .phone-screen { min-height: 520px; padding: 14px; }
      .title { font-size: 14px; }
      .character-wrap { width: 180px; height: 180px; }
      .join-button { padding: 12px 18px; font-size: 10px; }
    }
  </style>
</head>
<body>
  <main class="stage" role="main" aria-labelledby="page-title">
    <!-- Decorative layered background -->
    <div class="bg" aria-hidden="true">
      <div class="sky">
        <div class="sun" aria-hidden="true"></div>
      </div>
      <div class="terrain">
        <div class="blocks" aria-hidden="true">
          <!-- Generate many blocks for the ground -->
          <div class="block"></div><div class="block"></div><div class="block"></div><div class="block"></div>
          <div class="block"></div><div class="block"></div><div class="block"></div><div class="block"></div>
          <div class="block"></div><div class="block"></div><div class="block"></div><div class="block"></div>
        </div>
      </div>
    </div>

    <!-- Card / phone mockup -->
    <section class="card" aria-label="Sunucu kartı">
      <div class="phone-screen" role="region" aria-labelledby="page-title">
        <!-- In-screen decorative background -->
        <div class="in-screen-bg" aria-hidden="true">
          <div class="in-screen-sky"></div>
          <div class="in-screen-terrain"></div>
        </div>

        <!-- Content -->
        <header>
          <h1 id="page-title" class="title">XERELA SUNUCUSU</h1>
          <div class="subtitle">Sivas sunucusuna bağlanılıyor...</div>
        </header>

        <!-- Character SVG (pixel-style Steve-like) -->
        <div class="character-wrap" aria-hidden="true">
          <!-- Simple pixel-art SVG character (original, non-trademarked) -->
          <svg width="220" height="220" viewBox="0 0 220 220" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Karakter">
            <defs>
              <linearGradient id="g1" x1="0" x2="0" y1="0" y2="1">
                <stop offset="0" stop-color="#9ad3ff"/>
                <stop offset="1" stop-color="#4aa6ff"/>
              </linearGradient>
            </defs>

            <!-- shadow -->
            <ellipse cx="110" cy="190" rx="60" ry="18" fill="rgba(0,0,0,0.45)"/>

            <!-- body (blocky) -->
            <rect x="70" y="90" width="80" height="80" fill="#3b82c4" stroke="#1f4f7a" stroke-width="2"/>
            <!-- head -->
            <rect x="80" y="40" width="60" height="60" fill="#f2c08a" stroke="#b07a4a" stroke-width="2"/>
            <!-- eyes -->
            <rect x="95" y="60" width="10" height="10" fill="#0b2a3a"/>
            <rect x="115" y="60" width="10" height="10" fill="#0b2a3a"/>
            <!-- pickaxe (floating) -->
            <g transform="translate(150,40) rotate(18)">
              <rect x="-2" y="0" width="6" height="60" fill="#6b4b2a" />
              <rect x="-12" y="-10" width="24" height="20" fill="#9ad3ff" />
              <rect x="-12" y="-6" width="24" height="6" fill="#4aa6ff" opacity="0.9"/>
            </g>

            <!-- floating blocks -->
            <rect x="30" y="30" width="28" height="28" fill="#7bbf4a" stroke="#5fa033" stroke-width="2"/>
            <rect x="170" y="120" width="28" height="28" fill="#7bbf4a" stroke="#5fa033" stroke-width="2"/>
            <rect x="30" y="150" width="28" height="28" fill="#7bbf4a" stroke="#5fa033" stroke-width="2"/>
          </svg>
        </div>

        <!-- Join button and status -->
        <div style="display:flex;flex-direction:column;align-items:center;width:100%;">
          <button id="joinBtn" class="join-button" aria-label="Sunucuya katıl">
            <span>SUNUCUYA KATIL</span>
          </button>

          <div id="status" class="status-pill" role="status" aria-live="polite">Bağlantı: Bekleniyor</div>
        </div>

        <!-- Shatter layer for visual effect -->
        <div class="shatter-layer" id="shatterLayer" aria-hidden="true"></div>

        <footer class="footer">Xerela • Sivas Sunucusu • 2026</footer>
      </div>
    </section>
  </main>

  <script>
    /* ---------- Pro-level JS: ses, animasyon, bağlantı simülasyonu ---------- */

    // Utility: play a short click/pop sound using WebAudio (no external file)
    function playClickSound() {
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const o = ctx.createOscillator();
        const g = ctx.createGain();
        o.type = 'square';
        o.frequency.setValueAtTime(880, ctx.currentTime);
        g.gain.setValueAtTime(0, ctx.currentTime);
        g.gain.linearRampToValueAtTime(0.12, ctx.currentTime + 0.001);
        g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.25);
        o.connect(g);
        g.connect(ctx.destination);
        o.start();
        o.stop(ctx.currentTime + 0.26);
      } catch (e) {
        // Fallback: short beep via alert audio (rare)
        console.warn('AudioContext not available', e);
      }
    }

    // Shatter effect: create small shards that fly out from button
    function createShatter(x, y, count = 18) {
      const layer = document.getElementById('shatterLayer');
      const rect = layer.getBoundingClientRect();
      for (let i = 0; i < count; i++) {
        const shard = document.createElement('div');
        shard.className = 'shard';
        // randomize size and color
        const size = 10 + Math.round(Math.random() * 18);
        shard.style.width = size + 'px';
        shard.style.height = size + 'px';
        shard.style.left = (x - rect.left - size/2) + 'px';
        shard.style.top = (y - rect.top - size/2) + 'px';
        shard.style.background = `linear-gradient(${Math.random()*360}deg, #ffb07a, #ff7a1a)`;
        shard.style.opacity = '1';
        layer.appendChild(shard);

        // animate using Web Animations API
        const angle = Math.random() * Math.PI * 2;
        const dist = 80 + Math.random() * 160;
        const rotate = (Math.random() * 720) - 360;
        shard.animate([
          { transform: 'translate(0px,0px) rotate(0deg) scale(1)', opacity: 1 },
          { transform: `translate(${Math.cos(angle)*dist}px, ${Math.sin(angle)*dist - 20}px) rotate(${rotate}deg) scale(0.6)`, opacity: 0 }
        ], {
          duration: 700 + Math.random()*400,
          easing: 'cubic-bezier(.2,.9,.3,1)'
        });

        // remove after animation
        setTimeout(() => shard.remove(), 1200);
      }
    }

    // Simulate connecting to server with status updates
    function simulateConnection() {
      const status = document.getElementById('status');
      status.textContent = 'Bağlantı: Sunucuya istek gönderildi...';
      setTimeout(() => status.textContent = 'Bağlantı: Sunucu yanıt veriyor...', 900);
      setTimeout(() => status.textContent = 'Bağlantı: Doğrulanıyor...', 1800);
      setTimeout(() => status.textContent = 'Bağlantı: Başarılı! Sunucuya yönlendiriliyorsun...', 3000);
      setTimeout(() => {
        status.textContent = 'Bağlantı: Tamamlandı — Hoş geldin!';
        // small celebration shards
        const btn = document.getElementById('joinBtn');
        const rect = btn.getBoundingClientRect();
        createShatter(rect.left + rect.width/2, rect.top + rect.height/2, 28);
      }, 4200);
    }

    // Main button handler
    document.getElementById('joinBtn').addEventListener('click', function (e) {
      // Play sound
      playClickSound();

      // Button press micro-animation
      this.animate([
        { transform: 'translateY(0) scale(1)' },
        { transform: 'translateY(6px) scale(0.98)' },
        { transform: 'translateY(0) scale(1)' }
      ], { duration: 260, easing: 'cubic-bezier(.2,.9,.3,1)' });

      // Create shatter at click position
      createShatter(e.clientX, e.clientY, 12);

      // Start simulated connection
      simulateConnection();
    });

    // Accessibility: allow Enter/Space to trigger
    document.getElementById('joinBtn').addEventListener('keydown', function (e) {
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        this.click();
      }
    });

    // Optional: small parallax on mouse move for depth
    (function enableParallax() {
      const card = document.querySelector('.card');
      if (!card) return;
      window.addEventListener('mousemove', (ev) => {
        const w = window.innerWidth;
        const h = window.innerHeight;
        const cx = w/2, cy = h/2;
        const dx = (ev.clientX - cx) / cx;
        const dy = (ev.clientY - cy) / cy;
        card.style.transform = `translate3d(${dx*6}px, ${dy*6}px, 0)`;
      });
      window.addEventListener('mouseleave', () => card.style.transform = '');
    })();

    // Ensure focus styles for keyboard users
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Tab') document.body.classList.add('show-focus');
    });
  </script>
</body>
                                       </html>
